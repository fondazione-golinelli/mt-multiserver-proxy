name: Sync upstream proxy

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-proxy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Merge upstream main
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/HimbeerserverDE/mt-multiserver-proxy.git
          git fetch upstream main

          UPSTREAM_SHA=$(git rev-parse upstream/main)
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --no-edit "$UPSTREAM_SHA"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Test merged proxy
        if: steps.merge.outputs.changed == 'true'
        run: go test ./...

      - name: Validate Docker image build
        if: steps.merge.outputs.changed == 'true'
        run: docker buildx build --platform linux/amd64 .

      - name: Push synced fork
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main
